# Prevent xpad from claiming the Xbox Elite Series 2 controller.
# This allows our userspace driver (xbelite2d) to use it via usbhid/hidraw.
#
# Install with:
#   sudo cp modprobe.d/xbelite2-blacklist.conf /etc/modprobe.d/
#   sudo udevadm control --reload-rules
#
# The controller will appear as a hidraw device instead of a joystick.
# Our daemon handles the input translation.

# Option 1: Fully blacklist xpad (prevents ALL Xbox controllers from using xpad)
# blacklist xpad

# Option 2: Only prevent xpad from claiming Elite 2 (preferred)
# This uses a udev rule instead - see 99-xbelite2.rules
