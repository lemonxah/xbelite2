# Blacklist drivers that conflict with xbelite2
# 
# hid_microsoft: Only affects old quirky Microsoft devices from 2000s.
#                Modern Microsoft peripherals work fine with hid-generic.
#
# xpad: Generic Xbox controller driver that also matches Elite 2.
#       If you have other (non-Elite) Xbox controllers, remove the xpad blacklist
#       and manually unbind Elite 2 devices after connecting.
#
# To manually unbind Elite 2 from xpad (if you remove the blacklist):
#   Find the device: ls /sys/bus/usb/drivers/xpad/
#   Unbind: echo "1-1:1.0" > /sys/bus/usb/drivers/xpad/unbind
#   Bind to xbelite2: echo "1-1:1.0" > /sys/bus/usb/drivers/xbelite2/bind

blacklist hid_microsoft
blacklist xpad

