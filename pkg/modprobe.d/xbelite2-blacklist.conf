# Prevent other drivers from claiming Xbox Elite Series 2 controllers.

# Load xbelite2 before hid-microsoft and xpad so it registers first
# and claims the device before other drivers can create input nodes.
softdep hid_microsoft pre: xbelite2
softdep xpad pre: xbelite2

# Prevent hid-microsoft from claiming Elite 2 over Bluetooth.
# When hid_microsoft loads, unbind any Elite 2 devices it grabbed
# and remove their orphaned input devices.
install hid_microsoft /sbin/modprobe --ignore-install hid_microsoft; \
    for dev in /sys/bus/hid/drivers/microsoft/0005:045E:0B22.* \
               /sys/bus/hid/drivers/microsoft/0005:045E:0B05.*; do \
        [ -e "$dev" ] && echo "$(basename $dev)" > /sys/bus/hid/drivers/microsoft/unbind 2>/dev/null; \
    done

# Prevent xpad from claiming Elite 2 over USB.
install xpad /sbin/modprobe --ignore-install xpad; \
    for dev in /sys/bus/usb/drivers/xpad/*; do \
        [ -e "$dev/idVendor" ] && grep -q 045e "$dev/idVendor" 2>/dev/null && \
        grep -q 0b00 "$dev/idProduct" 2>/dev/null && \
        echo "$(basename $dev)" > /sys/bus/usb/drivers/xpad/unbind 2>/dev/null; \
    done
