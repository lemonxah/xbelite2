# Prevent xpadneo from claiming Xbox Elite Series 2 controllers.
# Our daemon (xbelite2d) handles these via hidraw instead.
#
# This works by adding the Elite 2 PIDs to xpadneo's blacklist.
# Other Xbox controllers continue to use xpadneo normally.
install xpadneo /sbin/modprobe --ignore-install xpadneo; echo 'removing Elite 2 from xpadneo' > /dev/null; for dev in /sys/bus/hid/drivers/xpadneo/0005:045E:0B22.* /sys/bus/hid/drivers/xpadneo/0005:045E:0B05.* /sys/bus/hid/drivers/xpadneo/0005:045E:028E.*; do [ -e "$dev" ] && echo "$(basename $dev)" > /sys/bus/hid/drivers/xpadneo/unbind 2>/dev/null; done
