# Prevent hid_microsoft from claiming Xbox Elite Series 2 controllers
# The xbelite2 driver provides full support including paddle suppression,
# native input devices, and force-feedback. hid_microsoft creates duplicate
# input devices and lacks Elite-specific features.

# Option 1: Soft dependency - load xbelite2 first (doesn't prevent binding)
softdep hid_microsoft pre: xbelite2

# Option 2: Install hook - unbind Elite 2 devices after hid_microsoft loads
install hid_microsoft /sbin/modprobe --ignore-install hid_microsoft; \
    for dev in /sys/bus/hid/drivers/microsoft/0005:045E:0B22.* \
               /sys/bus/hid/drivers/microsoft/0005:045E:0B05.*; do \
        [ -e "$dev" ] && echo "$(basename $dev)" > /sys/bus/hid/drivers/microsoft/unbind 2>/dev/null || true; \
    done
